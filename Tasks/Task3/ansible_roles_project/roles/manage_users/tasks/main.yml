---
# Tasks for manage_users role

- name: Ensure target groups exist
  ansible.builtin.group:
    name: "{{ item.username }}"
    state: present
  loop: "{{ target_users }}"

- name: Create non-system users
  ansible.builtin.user:
    name: "{{ item.username }}"
    uid: "{{ item.uid }}"
    group: "{{ item.username }}"
    shell: /bin/bash
    state: present
  loop: "{{ target_users }}"

- name: Configure passwordless sudo access for users
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.username }}"
    content: "{{ item.username }} ALL=(ALL) NOPASSWD:ALL"
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
  loop: "{{ target_users }}"

- name: Create application directory in /opt with 660 permissions
  ansible.builtin.file:
    path: "{{ item.opt_dir }}"
    state: directory
    owner: "{{ item.username }}"
    group: "{{ item.username }}"
    mode: '0660'
  loop: "{{ target_users }}"